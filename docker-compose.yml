version: "3.9"

services:
  # ── Base de datos PostgreSQL local ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: blacklist_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       blacklist_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Microservicio Flask ──────────────────────────────────────────────────────
  api:
    build: .
    container_name: blacklist_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      DB_USER:        postgres
      DB_PASSWORD:    postgres
      DB_HOST:        db           # nombre del servicio de Docker Compose
      DB_PORT:        "5432"
      DB_NAME:        blacklist_db
      JWT_SECRET_KEY: super-secret-key-change-in-prod
      STATIC_TOKEN:   my-static-bearer-token
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
